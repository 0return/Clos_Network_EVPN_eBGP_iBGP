routing-policy {
    prefix-set peers {
        prefix 100.0.0.0/16 mask-length-range 32..32 {
        }
    }
    policy export-peers {
        default-action {
            policy-result reject
        }
        statement 10 {
            match {
                prefix {
                    prefix-set peers
                }
            }
            action {
                policy-result accept
            }
        }
    }
    policy import-peers {
        default-action {
            policy-result reject
        }
        statement 10 {
            match {
                prefix {
                    prefix-set peers
                }
            }
            action {
                policy-result accept
            }
        }
    }
}

    interface ethernet-1/1 {
        admin-state enable
        subinterface 0 {
            ipv4 {
                admin-state enable
                address 10.1.1.1/30 {
                }
            }
        }
    }
    interface ethernet-1/2 {
        admin-state enable
        subinterface 0 {
            admin-state enable
            ipv4 {
                admin-state enable
                address 10.1.2.1/30 {
                    primary
                }
            }
        }
    }
    interface ethernet-1/3 {
        admin-state enable
        subinterface 0 {
            admin-state enable
            ipv4 {
                admin-state enable
                address 10.1.3.1/30 {
                }
            }
        }
    }
    interface mgmt0 {
        admin-state enable
        subinterface 0 {
            admin-state enable
            ipv4 {
                admin-state enable
                dhcp-client {
                }
            }
            ipv6 {
                admin-state enable
                dhcp-client {
                }
            }
        }
    }
    interface system0 {
        subinterface 0 {
            admin-state enable
            ipv4 {
                admin-state enable
                address 100.0.1.1/32 {
                }
            }
        }
    }
    network-instance default {
        type default
        interface ethernet-1/1.0 {
        }
        interface ethernet-1/2.0 {
        }
        interface ethernet-1/3.0 {
        }
        interface system0.0 {
        }
        protocols {
            bgp {
                admin-state enable
                autonomous-system 64999
                router-id 100.0.1.1
                afi-safi ipv4-unicast {
                    admin-state enable
                }
                group evpnRR {
                    peer-as 65000
                    afi-safi evpn {
                        admin-state enable
                    }
                    afi-safi ipv4-unicast {
                        admin-state enable
                    }
                    local-as {
                        as-number 65000
                    }
                    route-reflector {
                        cluster-id 100.0.1.1
                    }
                }
                group leaf {
                    export-policy [
                        export-peers
                    ]
                    import-policy [
                        import-peers
                    ]
                }
                neighbor 10.1.1.2 {
                    peer-as 65001
                    peer-group leaf
                }
                neighbor 10.1.2.2 {
                    peer-as 65002
                    peer-group leaf
                }
                neighbor 10.1.3.2 {
                    peer-as 65003
                    peer-group leaf
                }
                neighbor 100.0.2.1 {
                    peer-group evpnRR
                }
                neighbor 100.0.2.2 {
                    peer-group evpnRR
                }
                neighbor 100.0.2.3 {
                    peer-group evpnRR
                }
            }
        }
    }


